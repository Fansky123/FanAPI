user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    client_max_body_size 32m;

    # 开启 gzip（前端资源 / JSON API）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript image/svg+xml;

    upstream fanapi_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root /app/web/dist;

        # ── API 反向代理 ───────────────────────────────────────
        # 匹配所有 Go 后端路由前缀
        location ~ ^/(auth|user|admin|v1|health|docs)(/|$) {
            proxy_pass         http://fanapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # 超时：LLM 流式响应可能较长
            proxy_connect_timeout  10s;
            proxy_read_timeout    180s;
            proxy_send_timeout    180s;

            # SSE / 流式响应：禁用缓冲
            proxy_buffering       off;
            proxy_cache           off;
            proxy_request_buffering off;
        }

        # ── 前端 SPA ──────────────────────────────────────────
        location / {
            # 静态文件优先；找不到时回退 index.html（Vue Router history 模式）
            try_files $uri $uri/ /index.html;
        }

        # 静态资源增加长缓存（Vite 构建产物带 hash）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html 不缓存（确保更新版本立即生效）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
