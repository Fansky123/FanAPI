# =============================================================
# FanAPI — docker-compose 生产部署
#
# 【同机部署（默认）】
#   docker-compose up -d
#   → 启动 api + script 两个容器
#
# 【仅启动 API（脚本服务另机部署）】
#   docker-compose up -d api
#
# 【仅启动 Script Worker（另机单独跑）】
#   docker-compose up -d script
#
# 【构建镜像】
#   docker-compose build api
#   docker-compose build script
#
# 【推送镜像到私有仓库后在另一台机器拉取】
#   docker pull registry.example.com/fanapi-script:latest
#   docker run -d -v /host/config.yaml:/app/config.yaml \
#              registry.example.com/fanapi-script:latest
#
# =============================================================

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fanapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ww123456
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fanapi"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - ./docker/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API 服务 + 前端静态（nginx + fanapi-server）──────────
  api:
    build:
      context: .
      target: api
    image: fanapi-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "${FANAPI_BIND_IP:-127.0.0.1}:${FANAPI_HTTP_PORT:-8088}:80"
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Script Worker（异步任务处理）────────────────────────
  script:
    build:
      context: .
      target: script
    image: fanapi-script:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro

volumes:
  postgres-data:
  redis-data:
  nats-data:
