# =============================================================
# FanAPI — docker-compose 生产部署（依赖外部中间件）
#
# 前提：PostgreSQL、Redis、NATS 需在容器外部（或其他 compose 项目）
# 独立部署，并在 config.docker.yaml 中填写正确的连接地址。
#
# 【同机部署（默认）】
#   docker-compose up -d
#   → 启动 api + script 两个容器
#
# 【仅启动 API（脚本服务另机部署）】
#   docker-compose up -d api
#
# 【仅启动 Script Worker（另机单独跑）】
#   docker-compose up -d script
#
# 【构建镜像】
#   docker-compose build api
#   docker-compose build script
#
# 【推送镜像到私有仓库后在另一台机器拉取】
#   docker pull registry.example.com/fanapi-script:latest
#   docker run -d -v /host/config.yaml:/app/config.yaml \
#              registry.example.com/fanapi-script:latest
#
# =============================================================

services:
  # ── API 服务 + 前端静态（nginx + fanapi-server）──────────
  api:
    build:
      context: .
      target: api
    image: fanapi-api:latest
    restart: unless-stopped
    ports:
      - "${FANAPI_BIND_IP:-127.0.0.1}:${FANAPI_HTTP_PORT:-8088}:80"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Script Worker（异步任务处理）────────────────────────
  script:
    build:
      context: .
      target: script
    image: fanapi-script:latest
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
